name: Daily LinkedIn Auto-Post

on:
  schedule:
    # Runs every day at 10:00 AM UTC
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI for testing

jobs:
  trigger-auto-post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Cron Endpoint
        run: |
          curl -X GET "https://linkedin-agent-es.vercel.app/api/cron/auto-post" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
